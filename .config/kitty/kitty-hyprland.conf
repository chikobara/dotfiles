# vim:ft=kitty

## name:     Catppuccin Kitty Macchiato
## author:   Catppuccin Org
## license:  MIT
## upstream: https://github.com/catppuccin/kitty/blob/main/themes/macchiato.conf
## blurb:    Soothing pastel theme for the high-spirited!

remember_window_size  no
initial_window_width  850
initial_window_height 500

# font_family           SpaceMono Nerd Font
font_family             JetBrainsMono Nerd Font
#font_family            VictorMono Nerd Font
#font_family            CaskaydiaMono Nerd Font
bold_font               auto
italic_font             auto
bold_italic_font        auto
font_size 11.0
font_features FiraCode-Regular +cv02 +cv05 +cv09 +cv14 +ss04 +cv16 +cv31 +cv25 +cv26 +cv32 +cv28 +ss10 +zero +onum


transparent background
#hide_window_decorations no
#linux_display_server        x11
background_opacity 0.8
background_blur 1
dynamic_background_opacity yes

shell_integration  no-cursor
cursor_shape block
#cursor_blink_interval -1
cursor_stop_blinking_after 15.0
cursor_trail 1
cursor_trail_decay 0.5 0.8
cursor_trail_start_threshold 1


# Kitty window border colors

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

#include ~/.cache/wal/colors-kitty.conf
#include ./kitty-themes/themes/rose-pine



foreground               #e0def4
background               #191724
selection_foreground     #e0def4
selection_background     #403d52

cursor                   #524f67
cursor_text_color        #e0def4

url_color                #c4a7e7

active_tab_foreground    #e0def4
active_tab_background    #26233a
inactive_tab_foreground  #6e6a86
inactive_tab_background  #191724

active_border_color      #31748f
inactive_border_color    #403d52

# black
color0   #26233a
color8   #6e6a86

# red
color1   #eb6f92
color9   #eb6f92

# green
color2   #31748f
color10  #31748f

# yellow
