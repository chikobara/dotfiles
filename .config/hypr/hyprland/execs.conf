# Bar, wallpaper
# exec-once = swww-daemon --format xrgb
# exec = swaync
# exec = swayosd-server
exec-once = wal -R
# exec-once = /usr/lib/geoclue-2.0/demos/agent & gammastep & gammastep-indicator
# exec-once = /usr/lib/geoclue-2.0/demos/agent & 
# exec-once = ags &

exec-once = hyprpanel

# exec-once = cd ~/.config/fabric/bar/ && python main.py

# Input method
# exec-once = fcitx5

# Core components (authentication, lock screen, notification daemon)
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 || /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = hypridle
exec-once = dbus-update-activation-environment --all
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Some fix idk
exec-once = hyprpm reload
exec-once = cpufreqctl turbo set off

# Clipboard: history
# exec-once = wl-paste --watch cliphist store &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Classic 32
# exec-once = gsettings set org.gnome.desktop.interface cursor-theme Bibata-Modern-Classic 
# exec-once = gsettings set org.gnome.desktop.interface cursor-size 24

# Rog Control Center
exec-once = sleep 3 && rog-control-center
