# MONITOR CONFIG
# monitor=,preferred,auto,1
monitor = eDP-1, 1920x1080@144, 0x0, 1

monitor=,preferred, auto, 1, mirror, eDP-1 # Custom reserved area

# HDMI port: mirror display. To see device name, use `hyprctl monitors`
# monitor=HDMI-A-1,1920x1080@60,1920x0,1,mirror,eDP-1

device {
  name = elan1205:00-04f3:30e9-touchpad
  sensitivity = 0
}

input {

    # Keyboard: Add a layout and uncomment kb_options for Win+Space switching shortcut
    kb_layout = us, ara
    kb_options = grp:win_space_toggle
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35
    

    touchpad {
        natural_scroll = false
        disable_while_typing = false
        clickfinger_behavior = true
        scroll_factor = 2.1
        # sensitivity = 0.1
    }
    special_fallthrough = true
    follow_mouse = 1
    force_no_accel = false

    sensitivity = -0.6
}

binds {
    # focus_window_on_workspace_c# For Auto-run stuff see execs.confhange = true
    scroll_event_delay = 0
}

# gestures {
    gesture = 3, horizontal, workspace
    gesture = 3, down, mod: ALT, close
    gesture = 3, up, mod: SUPER, scale: 1.5, fullscreen
#     # workspace_swipe = true
#     workspace_swipe_distance = 700
#     workspace_swipe_fingers = 3
#     workspace_swipe_cancel_ratio = 0.2
#     workspace_swipe_min_speed_to_force = 5
#     workspace_swipe_direction_lock = false
#     workspace_swipe_direction_lock_threshold = 10
#     workspace_swipe_create_new = true
# }

general {
    # Gaps and border
    gaps_in = 10
    gaps_out = 16
    gaps_workspaces = 50
    border_size = 3
    
    # Fallback colors #4A4A4C
    # b675e699, e6b1e3FF
    col.active_border = rgba(B9A0DDff)
    col.inactive_border = rgba(B588D9FF)

    resize_on_border = true
    no_focus_fallback = true
    layout = dwindle
    
    #focus_to_other_workspaces = true # ahhhh i still haven't properly implemented this
    allow_tearing = true # This just allows the `immediate` window rule to work
    extend_border_grab_area = 5
    hover_icon_on_border = false
    no_border_on_floating = false
}

dwindle {
	preserve_split = true
        # no_gaps_when_only = 1
	smart_split = true
	smart_resizing = true
}

decoration {
    rounding = 12
    
    blur {
        enabled = true
        xray = false
        special = true
        new_optimizations = true
        size = 8
        passes = 6
        noise = 0.01
        contrast = 0.9
        brightness = 0.89
        vibrancy = 0.19
        vibrancy_darkness = 0.0
        popups = true
        popups_ignorealpha = 1
        ignore_opacity = true
    }

    # Shader
    # screen_shader = ~/.config/hypr/shaders/nothing.frag
    # screen_shader = ~/.config/hypr/shaders/vibrance.frag
    
    # Dim
    dim_inactive = true
    dim_strength = 0.159
    dim_special = 0
    active_opacity = 0.9
    #
    shadow {
        enabled = true
        render_power = 8
        range = 40
        color = rgba(00000066)
        color_inactive = rgba(00000055)
    }
}

animations {
    enabled = true
    # Animation curves
    # first_launch_animation = true   
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 # use with .2s duration
    # Animation configs
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    # animation = layers, 1, 2, md3_decel, slide
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = workspaces, 1, 7, menu_decel, slide
    # animation = workspaces, 1, 2.5, softAcDecel, slide
    # animation = workspaces, 1, 7, menu_decel, slidefade 15%
    # animation = specialWorkspace, 1, 3, md3_decel, slidefadevert 15%
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

misc {
    vfr = 1
    vrr = 1
    # layers_hog_mouse_focus = true
    focus_on_activate = false
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)
    
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    new_window_takes_over_fullscreen = 2
    allow_session_lock_restore = true
    
    initial_workspace_tracking = false
}

# Overview
plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(000000)
        workspace_method = first 1 # [center/first] [workspace] e.g. first 1 or center m+1

        enable_gesture = false # laptop touchpad, 4 fingers
        gesture_distance = 300 # how far is the "max"
        gesture_positive = false
    }
}
