# ######## Window rules ########
# windowrule = noblur,.*

# ######## Window rules ########

# Applies transparency to EVERY WINDOW
windowrule = match:class .*, opacity 0.92 override 0.85 override

# General App Rules
windowrule = match:class dev\.warp\.Warp, tile on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float on
windowrule = match:title ^(Free Download Manager)(.*)$, float on
windowrule = match:title ^(Windscribe)(.*)$, float on
windowrule = match:title ^(wdisplays)(.*)$, float on
windowrule = match:title ^(Telegram)(.*)$, float on
windowrule = match:title ^(LocalSend)(.*)$, float on

# Dialogs (Open File, Save As, etc.)
windowrule = match:title ^(Open File)(.*)$, center on
windowrule = match:title ^(Select a File)(.*)$, center on
windowrule = match:title ^(Choose wallpaper)(.*)$, center on
windowrule = match:title ^(Open Folder)(.*)$, center on
windowrule = match:title ^(Save As)(.*)$, center on
windowrule = match:title ^(Library)(.*)$, center on
windowrule = match:title ^(File Upload)(.*)$, center on

# Picture-in-Picture
windowrule = match:title ^(Picture(-| )in(-| )[Pp]icture)$
windowrule = match:title ^(Picture(-| )in(-| )[Pp]icture)$, move 73% 72%
windowrule = match:title ^(Picture(-| )in(-| )[Pp]icture)$, size 25% 25%
windowrule = match:title ^(Picture(-| )in(-| )[Pp]icture)$, float on
windowrule = match:title ^(Picture(-| )in(-| )[Pp]icture)$, pin on

# Dialogs
windowrule=match:title ^(Open File)(.*)$, float on
windowrule=match:title ^(Select a File)(.*)$, float on
windowrule=match:title ^(Choose wallpaper)(.*)$, float on
windowrule=match:title ^(Open Folder)(.*)$, float on
windowrule=match:title ^(Save As)(.*)$, float on
windowrule=match:title ^(Library)(.*)$, float on
windowrule=match:title ^(File Upload)(.*)$, float on 

# Tearing
##### windowrule=immediate,.*\.exe
windowrule=match:class (steam_app), immediate on

# No shadow for tiled windows
# windowrulev2 = noshadow,floating:0

# ######## Layer rules ########

# Global
layerrule {
    name = global_xray
    xray = 1
    match:namespace = .*
}

# No Animations
layerrule {
    name = disable_animations
    no_anim = on
    match:namespace = ^(walker|selection|overview|anyrun|indicator.*|osk|hyprpicker|noanim)$
}

# Standard Blur & Alpha (Combined for cleanliness)
layerrule {
    name = standard_blur
    blur = on
    ignore_alpha = 0.6
    match:namespace = ^(shell:.*|bar|corner.*|dock|indicator.*|overview|cheatsheet|sideleft.*|sideright.*|osk)$
}

# Custom Alpha Layers
layerrule {
    name = launcher_blur
    blur = on
    ignore_alpha = 0.5
    match:namespace = launcher
}

layerrule {
    name = notifications_blur
    blur = on
    ignore_alpha = 0.69
    match:namespace = notifications
}

# GTK Layer Shell
layerrule {
    name = gtk_shell_blur
    blur = on
    ignore_alpha = 0
    match:namespace = gtk-layer-shell
}

# Session
layerrule {
    name = session_blur
    blur = on
    match:namespace = session
}

# AGS Animations
layerrule {
    name = ags_animations
    animation = slide top
    match:namespace = ^(sideleft.*|sideright.*)$
}
